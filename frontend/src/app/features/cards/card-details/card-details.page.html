<app-page-shell title="Card Details" [showFooter]="false">
  <ion-button slot="header-actions" fill="clear" (click)="back()">
    Back
  </ion-button>

  <form *ngIf="card" [formGroup]="cardForm" (ngSubmit)="saveChanges()">
    <ion-list class="card-details">
      <ion-item lines="none" *ngIf="imageSrc">
        <ion-label position="stacked">Scanned Image</ion-label>
        <img
          class="scanned-image"
          [src]="getCardImageSrc()"
          alt="Uploaded business card"
        />
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Name</ion-label>
        <ion-input formControlName="name" autocomplete="name"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="f['name']?.touched && f['name']?.invalid">
        <small *ngIf="f['name']?.errors?.['required']">Name is required</small>
        <small *ngIf="f['name']?.errors?.['minlength']"
          >At least 2 characters</small
        >
      </ion-text>

      <ion-item>
        <ion-label position="stacked">Email</ion-label>
        <ion-input
          type="email"
          formControlName="email"
          autocomplete="email"
        ></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="f['email']?.touched && f['email']?.invalid">
        <small *ngIf="f['email']?.errors?.['required']">Email is required</small>
        <small *ngIf="f['email']?.errors?.['email']">Enter a valid email</small>
      </ion-text>

      <ion-item>
        <ion-label position="stacked">Phone</ion-label>
        <ion-input formControlName="phone" autocomplete="tel"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Company</ion-label>
        <ion-input formControlName="company"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Category</ion-label>
        <ion-input formControlName="category"></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-label position="stacked">Scanned Text (OCR)</ion-label>
        <ion-text color="medium">
          <p class="raw-text">{{ card.rawText || '-' }}</p>
        </ion-text>
      </ion-item>
    </ion-list>

    <ion-button
      expand="block"
      type="submit"
      [disabled]="cardForm.invalid || saving"
      class="save-btn"
    >
      <ion-spinner *ngIf="saving" slot="start" name="crescent"></ion-spinner>
      <span *ngIf="!saving">Save changes</span>
    </ion-button>
  </form>

  <div class="card-details__empty" *ngIf="!card && !loading">
    Card not found.
  </div>
</app-page-shell>
