<ion-content fullscreen class="forgot-bg">
  <div class="hero-illustration" aria-hidden="true">
    <!-- simple floating lock SVG hero -->
    <svg viewBox="0 0 200 120" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="g2" x1="0" x2="1">
          <stop offset="0%" stop-color="#ff6b6b" stop-opacity=".9" />
          <stop offset="100%" stop-color="#ffa500" stop-opacity=".9" />
        </linearGradient>
      </defs>
      <rect
        x="30"
        y="20"
        width="140"
        height="80"
        rx="12"
        fill="url(#g2)"
        opacity="0.65"
      />
    </svg>
  </div>

  <div class="container">
    <div class="glass-card">
      <h1 class="title">Reset password</h1>
      <p class="subtitle">Enter your email and new password</p>

      <form [formGroup]="forgotForm" (ngSubmit)="submit()">
          <div class="field">
            <label class="field-label" for="forgot-email">Email</label>
            <input
              id="forgot-email"
              class="field-input"
              type="email"
              formControlName="email"
              autocomplete="email"
            />
          </div>
          <ion-text
            color="danger"
            *ngIf="f['email']?.touched && f['email']?.invalid"
          >
            <small *ngIf="f['email']?.errors?.['required']">
              Email is required
            </small>
            <small *ngIf="f['email']?.errors?.['email']">
              Enter a valid email
            </small>
          </ion-text>

          <div class="field password-field">
            <label class="field-label" for="forgot-password">New Password</label>
            <input
              id="forgot-password"
              class="field-input"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="newPassword"
              autocomplete="new-password"
            />
            <button
              class="toggle-password-btn"
              type="button"
              (click)="togglePassword()"
              aria-label="Toggle password visibility"
            >
              <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
            </button>
          </div>
          <ion-text
            color="danger"
            *ngIf="f['newPassword']?.touched && f['newPassword']?.invalid"
          >
            <small *ngIf="f['newPassword']?.errors?.['required']">
              Password is required
            </small>
            <small *ngIf="f['newPassword']?.errors?.['minlength']">
              At least 6 characters
            </small>
          </ion-text>

          <div class="field password-field">
            <label class="field-label" for="forgot-confirm-password">Confirm Password</label>
            <input
              id="forgot-confirm-password"
              class="field-input"
              [type]="showConfirmPassword ? 'text' : 'password'"
              formControlName="confirmPassword"
              autocomplete="new-password"
            />
            <button
              class="toggle-password-btn"
              type="button"
              (click)="toggleConfirmPassword()"
              aria-label="Toggle password visibility"
            >
              <ion-icon
                [name]="showConfirmPassword ? 'eye-off' : 'eye'"
              ></ion-icon>
            </button>
          </div>
          <ion-text
            color="danger"
            *ngIf="f['confirmPassword']?.touched && (f['confirmPassword']?.invalid || forgotForm.errors?.['passwordMismatch'])"
          >
            <small *ngIf="f['confirmPassword']?.errors?.['required']">
              Confirm password is required
            </small>
            <small *ngIf="f['confirmPassword']?.errors?.['minlength']">
              At least 6 characters
            </small>
            <small *ngIf="forgotForm.errors?.['passwordMismatch']">
              Passwords do not match
            </small>
          </ion-text>

          <div class="actions">
            <ion-button
              expand="block"
              type="submit"
              [disabled]="forgotForm.invalid || loading"
              class="submit-btn"
            >
              <ion-spinner
                *ngIf="loading"
                name="crescent"
                slot="start"
              ></ion-spinner>
              <span *ngIf="!loading">Reset password</span>
            </ion-button>
          </div>
      </form>

      <ion-text color="danger" *ngIf="error">
        <p class="ion-margin-top">{{ error }}</p>
      </ion-text>

      <ion-text color="success" *ngIf="success">
        <p class="ion-margin-top">
          <ion-icon name="checkmark-circle"></ion-icon>
          Check your email for reset instructions
        </p>
      </ion-text>

      <ion-button fill="clear" (click)="backToLogin()" color="medium">
        ← Back to login
      </ion-button>
    </div>
  </div>
</ion-content>
