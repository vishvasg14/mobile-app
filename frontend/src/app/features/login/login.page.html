<ion-content fullscreen class="login-bg">
  <div class="hero-illustration" aria-hidden="true">
    <!-- simple floating card SVG hero -->
    <svg viewBox="0 0 200 120" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="g" x1="0" x2="1">
          <stop offset="0%" stop-color="#8ec5ff" stop-opacity=".9" />
          <stop offset="100%" stop-color="#e0c3fc" stop-opacity=".9" />
        </linearGradient>
      </defs>
      <rect
        x="0"
        y="10"
        width="180"
        height="90"
        rx="12"
        fill="url(#g)"
        opacity="0.65"
      />
    </svg>
  </div>

  <div class="container" [class.keyboard-open]="keyboardOpen">
    <div class="glass-card">
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Sign in to continue to Mobile Card Scanner</p>

        <form [formGroup]="loginForm" (ngSubmit)="login()">
          <div class="field">
            <label class="field-label" for="email-input">Email</label>
            <input
              id="email-input"
              class="field-input"
              type="email"
              formControlName="email"
              (focus)="onFocus()"
              (blur)="onBlur()"
              autocomplete="email"
            />
          </div>
          <ion-text
            color="danger"
            *ngIf="f['email']?.touched && f['email']?.invalid"
          >
            <small *ngIf="f['email']?.errors?.['required']"
              >Email is required</small
            >
            <small *ngIf="f['email']?.errors?.['email']"
              >Enter a valid email</small
            >
          </ion-text>

          <div class="field password-field">
            <label class="field-label" for="password-input">Password</label>
            <input
              id="password-input"
              class="field-input"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              (focus)="onFocus()"
              (blur)="onBlur()"
              autocomplete="current-password"
            />
            <button
              class="toggle-password-btn"
              type="button"
              (click)="togglePassword()"
              aria-label="Toggle password visibility"
            >
              <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
            </button>
          </div>
          <ion-text
            color="danger"
            *ngIf="f['password']?.touched && f['password']?.invalid"
          >
            <small *ngIf="f['password']?.errors?.['required']"
              >Password is required</small
            >
            <small *ngIf="f['password']?.errors?.['minlength']"
              >At least 6 characters</small
            >
          </ion-text>

          <div class="actions">
            <div class="remember-row">
              <label class="remember-label">
                <ion-checkbox formControlName="remember"></ion-checkbox>
                <span>Remember me</span>
              </label>
              <ion-button fill="clear" size="small" routerLink="/forgot"
                >Forgot?</ion-button
              >
            </div>

            <ion-button
              expand="block"
              type="submit"
              [disabled]="loginForm.invalid || loading"
              class="login-btn"
            >
              <ion-spinner
                *ngIf="loading"
                name="crescent"
                slot="start"
              ></ion-spinner>
              <span *ngIf="!loading">Login</span>
            </ion-button>
          </div>
        </form>

        <ion-text color="danger" *ngIf="error">
          <p class="ion-margin-top">{{ error }}</p>
        </ion-text>

        <div class="divider" aria-hidden="true">
          <span>Or continue with</span>
        </div>

        <div class="social-row">
          <ion-button fill="clear" (click)="socialLogin('google')">
            <ion-icon name="logo-google"></ion-icon>
            <span>Google</span>
          </ion-button>
          <ion-button fill="clear" (click)="socialLogin('facebook')">
            <ion-icon name="logo-facebook"></ion-icon>
            <span>Facebook</span>
          </ion-button>
          <ion-button fill="clear" (click)="socialLogin('apple')">
            <ion-icon name="logo-apple"></ion-icon>
            <span>Apple</span>
          </ion-button>
        </div>

        <div class="biometric-row">
          <ion-button
            fill="outline"
            shape="round"
            (click)="biometricLogin()"
            title="Use biometrics"
          >
            <ion-icon name="finger-print-outline"></ion-icon>
          </ion-button>
          <small>Use biometrics</small>
        </div>

        <div class="register-row">
          <span>New here?</span>
          <ion-button fill="clear" size="small" routerLink="/register">
            Create account
          </ion-button>
        </div>

        <div class="admin-row">
          <ion-button fill="clear" size="small" routerLink="/admin-login">
            Admin Login
          </ion-button>
        </div>
    </div>
  </div>
</ion-content>
