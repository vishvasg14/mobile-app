<app-page-shell title="Contact Card">
  <ion-spinner *ngIf="loading"></ion-spinner>

  <ion-card *ngIf="!loading && card">
    <ion-card-header>
      <ion-card-title>{{ card.name || 'Unknown' }}</ion-card-title>
      <ion-card-subtitle>{{ card.company }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <p><strong>Email:</strong> {{ card.email }}</p>
      <p><strong>Phone:</strong> {{ card.phone }}</p>
      <p><strong>Category:</strong> {{ card.category }}</p>
    </ion-card-content>
  </ion-card>

  <ion-text color="danger" *ngIf="!loading && !card">
    <p>Invalid or expired link</p>
  </ion-text>

  <div class="ion-margin-top">
    <app-button text="Go to Login" fill="outline" (clicked)="goToLogin()"></app-button>
  </div>
</app-page-shell>
