<ion-content fullscreen class="admin-login-bg">
  <div class="container">
    <div class="card">
      <h1>Admin Login</h1>
      <p>Sign in with an admin account to access monitoring dashboard.</p>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="field">
          <label for="admin-email">Email</label>
          <input
            id="admin-email"
            class="field-input"
            type="email"
            formControlName="email"
            autocomplete="email"
          />
        </div>
        <ion-text color="danger" *ngIf="f['email']?.touched && f['email']?.invalid">
          <small *ngIf="f['email']?.errors?.['required']">Email is required</small>
          <small *ngIf="f['email']?.errors?.['email']">Enter valid email</small>
        </ion-text>

        <div class="field password-field">
          <label for="admin-password">Password</label>
          <input
            id="admin-password"
            class="field-input"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            class="toggle-btn"
            type="button"
            (click)="togglePassword()"
            aria-label="Toggle password visibility"
          >
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </button>
        </div>
        <ion-text color="danger" *ngIf="f['password']?.touched && f['password']?.invalid">
          <small *ngIf="f['password']?.errors?.['required']">Password is required</small>
          <small *ngIf="f['password']?.errors?.['minlength']">At least 6 characters</small>
        </ion-text>

        <ion-button
          class="submit-btn"
          expand="block"
          type="submit"
          [disabled]="loginForm.invalid || loading"
        >
          <ion-spinner *ngIf="loading" slot="start" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Login as Admin</span>
        </ion-button>
      </form>

      <ion-text color="danger" *ngIf="error">
        <p>{{ error }}</p>
      </ion-text>

      <ion-button fill="clear" routerLink="/login">
        Back to User Login
      </ion-button>
    </div>
  </div>
</ion-content>
